name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read

env:
  SITE_BASE_URL: https://moatazalalqami.online
  API_BASE_URL: https://moatazalalqami.online/api/public

jobs:
  android-apk:
    name: Build lightweight APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android project files
        run: |
          flutter --version
          flutter create --platforms=android --org com.moataz --project-name alalqami .

      - name: Force Android package id
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/namespace = "[^"]*"/namespace = "com.moataz.alalqami"/' android/app/build.gradle.kts
            sed -i 's/applicationId = "[^"]*"/applicationId = "com.moataz.alalqami"/' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i "s/namespace '[^']*'/namespace 'com.moataz.alalqami'/" android/app/build.gradle || true
            sed -i "s/applicationId '[^']*'/applicationId 'com.moataz.alalqami'/" android/app/build.gradle || true
          fi
          sed -i 's/android:label="[^"]*"/android:label="معتز العلقمي"/' android/app/src/main/AndroidManifest.xml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build split APKs
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SITE_BASE_URL=${SITE_BASE_URL} \
            --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Build universal APK
        run: |
          flutter build apk --release \
            --dart-define=SITE_BASE_URL=${SITE_BASE_URL} \
            --dart-define=API_BASE_URL=${API_BASE_URL}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moataz-alalqami-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
