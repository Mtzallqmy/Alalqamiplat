name: Build Flutter APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create Android if missing
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android --project-name alalqamiplat
          fi

      - name: Remove test folder
        run: rm -rf test

      - name: Set Android app name and permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          if manifest.exists():
              text = manifest.read_text()
              
              permission = '<uses-permission android:name="android.permission.INTERNET" />'
              if permission not in text:
                  text = text.replace(
                      '<manifest xmlns:android="http://schemas.android.com/apk/res/android">',
                      '<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    ' + permission
                  )

              if 'android:label=' in text:
                  text = re.sub(r'android:label="[^"]*"', 'android:label="معتز العلقمي"', text, count=1)
              else:
                  text = text.replace('<application ', '<application android:label="معتز العلقمي" ', 1)

              manifest.write_text(text)

          values = Path("android/app/src/main/res/values")
          values.mkdir(parents=True, exist_ok=True)
          strings = values / "strings.xml"
          strings.write_text('''<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">معتز العلقمي</string>
          </resources>
          ''')
          PY

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moataz-alalqami-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
