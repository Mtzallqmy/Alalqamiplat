name: Build Flutter APK
on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  android-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate Android project files
        run: |
          flutter create --platforms=android --org com.moataz --project-name alalqami .

      - name: Configure Android Manifest and App Name
        run: |
          # Add Internet Permission
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          # Change App Label (Display Name)
          sed -i 's/android:label="[^"]*"/android:label="معتز العلقمي"/' android/app/src/main/AndroidManifest.xml

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons

      - name: Remove test folder if exists
        run: rm -rf test

      - name: Flutter Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moataz-alalqami-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 30
